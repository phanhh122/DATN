<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu — HSK Flashcard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;900&family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.css"></link>
</head>

<body>
    <div id="auth-screen">
        <div class="auth-modal-overlay">
            <div class="auth-box">
                <div class="auth-logo">
                    <span class="hanzi">HSK Flashcard</span>
                    <div class="subtitle">Đặt lại mật khẩu</div>
                </div>

                <div id="auth-error" class="auth-error"></div>

                <!-- Form nhập mật khẩu mới — hiện khi link có token hợp lệ về mặt hình thức -->
                <form id="reset-form" class="auth-form" style="display:none">
                    <div class="form-group">
                        <label>Mật khẩu mới</label>
                        <div class="pw-field">
                            <input type="password" id="new-pass" placeholder="Tối thiểu 6 ký tự" autocomplete="new-password">
                            <button type="button" class="pw-toggle-btn" onclick="togglePasswordVisibility(this)"><i class="fa-solid fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Nhập lại mật khẩu mới</label>
                        <div class="pw-field">
                            <input type="password" id="confirm-pass" placeholder="Nhập lại mật khẩu mới" autocomplete="new-password">
                            <button type="button" class="pw-toggle-btn" onclick="togglePasswordVisibility(this)"><i class="fa-solid fa-eye"></i></button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="margin-top:4px; width:100%" id="reset-submit-btn">Đặt lại mật khẩu</button>
                </form>

                <div id="no-token-box" style="display:none;text-align:center">
                    <p style="color:#666;font-size:14px">Liên kết không hợp lệ hoặc đã thiếu thông tin. Vui lòng dùng đúng liên kết được gửi trong email.</p>
                </div>

                <!-- Hiện sau khi đặt lại mật khẩu thành công -->
                <div id="success-box" style="display:none;text-align:center">
                    <p style="color:#0a7a41;font-size:15px"><i class="fa-solid fa-circle-check"></i> Mật khẩu đã được đặt lại thành công.</p>
                    <a href="index.html" class="btn btn-primary" style="display:inline-block;margin-top:8px;text-decoration:none">Về trang đăng nhập</a>
                </div>

                <p class="auth-switch-hint"><a href="index.html"><i class="fa-solid fa-home"></i> Về trang chủ</a></p>
            </div>
        </div>
    </div>

    <script>
        window.API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? 'http://localhost:3000'
            : '';

        window.togglePasswordVisibility = function (btn) {
            const input = btn.previousElementSibling;
            if (!input) return;
            const icon = btn.querySelector('i');
            const show = input.type === 'password';
            input.type = show ? 'text' : 'password';
            if (icon) {
                icon.classList.toggle('fa-eye', !show);
                icon.classList.toggle('fa-eye-slash', show);
            }
        };

        function showError(msg) {
            const el = document.getElementById('auth-error');
            el.innerHTML = '<i class="fa-solid fa-exclamation-triangle"></i> ' + msg;
            el.style.display = 'block';
            el.style.background = '';
            el.style.color = '';
        }

        (function init() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (!token) {
                document.getElementById('no-token-box').style.display = 'block';
                return;
            }

            const form = document.getElementById('reset-form');
            form.style.display = 'block';

            form.addEventListener('submit', async function (e) {
                e.preventDefault();
                const newPass = document.getElementById('new-pass').value;
                const confirmPass = document.getElementById('confirm-pass').value;

                if (!newPass || newPass.length < 6) {
                    showError('Mật khẩu mới phải có ít nhất 6 ký tự');
                    return;
                }
                if (newPass !== confirmPass) {
                    showError('Mật khẩu nhập lại không khớp');
                    return;
                }

                const btn = document.getElementById('reset-submit-btn');
                const originalText = btn.textContent;
                btn.disabled = true;
                btn.textContent = 'Đang xử lý...';

                try {
                    const res = await fetch(`${window.API}/api/reset-password`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token, newPassword: newPass })
                    });

                    let data = {};
                    try { data = await res.json(); } catch (_) {}

                    if (!res.ok) {
                        showError(data.message || `Đặt lại mật khẩu thất bại (HTTP ${res.status})`);
                        btn.disabled = false;
                        btn.textContent = originalText;
                        return;
                    }

                    form.style.display = 'none';
                    document.getElementById('auth-error').style.display = 'none';
                    document.getElementById('success-box').style.display = 'block';
                } catch (err) {
                    console.error('[reset-password]', err);
                    showError('Không thể kết nối máy chủ. Vui lòng thử lại.');
                    btn.disabled = false;
                    btn.textContent = originalText;
                }
            });
        })();
    </script>
</body>

</html>
